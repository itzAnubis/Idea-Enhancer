initial_idea_critique:
  description: >
    Analyze the project idea: {user_idea}. 
    Identify a preliminary SWOT.
    If the vision is unclear, you MUST stop and ask the user 3-5 specific questions using the Human Input tool. Do not proceed or answer the questions yourself.
    Once the user provides answers, integrate them into a refined project scope.
  expected_output: >
    A refined project summary and a list of clarified requirements based on user feedback.

technical_and_market_validation:
  description: >
    Conduct a comprehensive technical, market, and financial validation of the project. This requires:
    1. Researching 2026 on-device LLM/STT benchmarks for Arabic legal audio. Focus on <16GB VRAM, offline capability, and real-time latency.
    2. Using web search to find 3 direct competitors in MENA legal tech. Analyze their privacy policies, pricing, and market gaps.
    3. Researching SaaS pricing tiers for B2B legal AI tools to suggest a tiered monthly model for solo practitioners vs mid-size firms.
    4. Use reddit_search (with sort='hot' and sort='top') to find customer discussions about similar tools, user pain points, and desired features.
    5. Compare Reddit insights with web search results for comprehensive market understanding.
    Synthesize all findings into a unified validation report.
  expected_output: >
    A structured report with: 
    1. Technical Architecture & Model Recommendations
    2. Competitor Comparison Table (Privacy, Pricing, Weaknesses)
    3. Tiered Pricing Strategy & Unit Economics
    4. Reddit Insights Summary (Trending Topics, User Feedback, Sentiment Analysis)

final_project_blueprint:
  description: >
    Synthesize the technical validation, market analysis, financial data, and Reddit insights into a 
    Master Idea Document formatted for an investor pitch. Ensure strict alignment 
    between tech capabilities and marketing claims (especially zero-cloud privacy).
  expected_output: >
    # Master Project Blueprint: {user_idea}
    
    ## 🎯 Executive Vision
    [1-2 paragraph pitch]
    
    ## ⚙️ Technical Architecture
    - Stack & Models (offline/local)
    - Data Flow & Privacy Controls
    - Hardware Requirements
    
    ## 📊 Market & Go-to-Market
    - Target Segments
    - Competitor Positioning
    - Pricing Tiers
    - Reddit Community Insights (Trending Topics, User Feedback)
    
    ## 💰 Financial & Risk
    - Development Cost Estimate
    - Liability & Compliance Mitigation
    - 12-Month Roadmap
    
    ## 📱 Reddit Discussion Summary
    - Hot Posts & Trending Topics
    - Key User Concerns & Feature Requests
    - Sentiment Analysis
    
    Format strictly in Markdown. No preamble.
