# This workflow will lint Python code with Ruff
# For more information see: https://docs.github.com/en/actions/quickstart

name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral.sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run Black check
      run: |
        uv run black --check .

    - name: Run Ruff check
      run: |
        uv run ruff check .

    - name: Run Ruff format check
      run: |
        uv run ruff format --check .

    - name: Run mypy type check
      run: |
        uv run mypy src/